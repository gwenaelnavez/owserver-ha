<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OW-SERVER History</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 20px; color: #fff; display: flex; align-items: center; gap: 10px; }
    h1 small { font-size: 0.8rem; color: #888; font-weight: normal; }
    .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .controls select, .controls button, .controls input {
      background: #1e1e1e; color: #e0e0e0; border: 1px solid #333; padding: 8px 14px; border-radius: 6px; font-size: 0.9rem;
    }
    .controls button { background: #1a73e8; color: #fff; border: none; cursor: pointer; }
    .controls button:hover { background: #1557b0; }
    .chart-container { background: #1e1e1e; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .chart-container canvas { width: 100% !important; }
    .error { color: #f44336; padding: 20px; text-align: center; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .stats { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat-card { background: #1e1e1e; border-radius: 10px; padding: 16px 24px; flex: 1; min-width: 120px; }
    .stat-card .value { font-size: 1.8rem; font-weight: bold; color: #fff; }
    .stat-card .label { font-size: 0.8rem; color: #888; margin-top: 4px; }
    .temp-warm { color: #ff9800; }
    .temp-cold { color: #42a5f5; }
    .temp-hot { color: #f44336; }
  </style>
</head>
<body>
  <h1>
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#e0e0e0" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7.5a5 5 0 1 0 6 0V5a3 3 0 0 0-3-3z"/><circle cx="12" cy="17" r="2" fill="#ff9800" stroke="none"/></svg>
    OW-SERVER Temperature History
    <small id="updateInfo"></small>
  </h1>

  <div class="controls">
    <select id="rangeSelect">
      <option value="1">Last hour</option>
      <option value="6" selected>Last 6 hours</option>
      <option value="12">Last 12 hours</option>
      <option value="24">Last 24 hours</option>
      <option value="72">Last 3 days</option>
      <option value="168">Last week</option>
    </select>
    <button id="refreshBtn">&#x21bb; Refresh</button>
    <span id="sensorCount" style="color:#888;font-size:0.9rem"></span>
  </div>

  <div class="stats" id="stats"></div>
  <div id="charts"></div>
  <div id="loading" class="loading"><div class="spinner"></div>Loading sensor data...</div>

  <script>
    const COLORS = ['#1a73e8','#f44336','#4caf50','#ff9800','#9c27b0','#00bcd4','#ff5722','#607d8b','#cddc39','#e91e63'];

    async function fetchApi(path) {
      const resp = await fetch(path);
      if (!resp.ok) throw new Error(`API error: ${resp.status}`);
      return resp.json();
    }

    const OWSERVER_DEVICE_PATTERN = /^sensor\.(ds18b20|ds18s20|ds1822|ds1820|ds2438|ds2406|ds2408|ds2423|ds2450|eds)[a-z0-9]*_[0-9a-f]{16}_temperature$/i;

    async function getOwserverSensors() {
      const states = await fetchApi('/api/states');
      return states.filter(s => OWSERVER_DEVICE_PATTERN.test(s.entity_id));
    }

    function tempColor(t) {
      if (t === null || t === undefined) return '';
      if (t < 10) return 'temp-cold';
      if (t < 25) return 'temp-warm';
      return 'temp-hot';
    }

    async function loadData() {
      const chartsDiv = document.getElementById('charts');
      const loadingDiv = document.getElementById('loading');
      const statsDiv = document.getElementById('stats');
      const sensorCount = document.getElementById('sensorCount');
      const updateInfo = document.getElementById('updateInfo');

      loadingDiv.style.display = 'block';
      chartsDiv.innerHTML = '';
      statsDiv.innerHTML = '';

      try {
        const sensors = await getOwserverSensors();
        sensorCount.textContent = `${sensors.length} sensor${sensors.length > 1 ? 's' : ''}`;

        if (sensors.length === 0) {
          loadingDiv.style.display = 'none';
          chartsDiv.innerHTML = '<div class="error">No OW-SERVER temperature sensors found. Create sensors via the integration first.</div>';
          return;
        }

        const hours = parseInt(document.getElementById('rangeSelect').value);
        const now = new Date();
        const start = new Date(now.getTime() - hours * 3600000);
        const end = now.toISOString();

        updateInfo.textContent = `updated just now`;

        const entityIds = sensors.map(s => s.entity_id);
        const history = await fetchApi(`/api/history/period/${start.toISOString()}?filter_entity_id=${entityIds.join(',')}&minimal_response&no_attributes`);

        const sensorMap = {};
        sensors.forEach(s => { sensorMap[s.entity_id] = s; });

        const historyMap = {};
        history.forEach(h => {
          h.forEach(entry => {
            if (!historyMap[entry.entity_id]) historyMap[entry.entity_id] = [];
            historyMap[entry.entity_id].push(entry);
          });
        });

        let currentTemps = sensors.map(s => ({
          name: s.attributes?.friendly_name || s.entity_id,
          temp: s.state !== 'unavailable' && s.state !== 'unknown' ? parseFloat(s.state) : null,
          entity_id: s.entity_id,
          history: historyMap[s.entity_id] || []
        }));
        currentTemps.sort((a, b) => (a.temp ?? -Infinity) > (b.temp ?? -Infinity) ? -1 : 1);

        statsDiv.innerHTML = currentTemps.map(s => `
          <div class="stat-card">
            <div class="value ${tempColor(s.temp)}">${s.temp !== null ? s.temp.toFixed(1) + '°C' : '--'}</div>
            <div class="label" title="${s.entity_id}">${s.name.replace('OW-SERVER ', '')}</div>
          </div>
        `).join('');

        sensors.forEach((sensor, idx) => {
          const entityHistory = historyMap[sensor.entity_id] || [];
          const data = entityHistory
            .filter(e => e.state !== 'unavailable' && e.state !== 'unknown' && !isNaN(parseFloat(e.state)))
            .map(e => ({ x: new Date(e.last_changed || e.last_updated), y: parseFloat(e.state) }));

          const container = document.createElement('div');
          container.className = 'chart-container';
          container.innerHTML = `
            <div style="display:flex;justify-content:space-between;margin-bottom:10px">
              <strong>${sensor.attributes?.friendly_name || sensor.entity_id}</strong>
              <span style="color:#888;font-size:0.9rem">${sensor.entity_id}</span>
            </div>
            <canvas id="chart-${idx}"></canvas>
          `;
          chartsDiv.appendChild(container);

          const ctx = document.getElementById(`chart-${idx}`).getContext('2d');
          new Chart(ctx, {
            type: 'line',
            data: {
              datasets: [{
                label: sensor.attributes?.friendly_name || sensor.entity_id,
                data: data,
                borderColor: COLORS[idx % COLORS.length],
                backgroundColor: COLORS[idx % COLORS.length] + '20',
                fill: true,
                tension: 0.3,
                pointRadius: 0,
                borderWidth: 2,
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: false,
              plugins: { legend: { display: false } },
              scales: {
                x: {
                  type: 'time',
                  time: { tooltipFormat: 'MMM d, HH:mm', displayFormats: { hour: 'HH:mm', day: 'MMM d' } },
                  grid: { color: '#333' },
                  ticks: { color: '#888', maxTicksLimit: 8 }
                },
                y: {
                  grid: { color: '#333' },
                  ticks: { color: '#888', callback: v => v + '°C' }
                }
              },
              interaction: { intersect: false, mode: 'nearest' }
            }
          });
        });

      } catch (err) {
        chartsDiv.innerHTML = `<div class="error">Error: ${err.message}</div>`;
      } finally {
        loadingDiv.style.display = 'none';
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', loadData);
    document.getElementById('rangeSelect').addEventListener('change', loadData);
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
